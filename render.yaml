services:
  - type: web
    name: ai-service
    env: python
    plan: free
    buildCommand: apt-get update && apt-get install -y tesseract-ocr tesseract-ocr-eng libgl1 poppler-utils && pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: PORT
        value: 8000
      - key: OPENAI_API_KEY
        sync: false
    healthCheckPath: /
    autoDeploy: true
